<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.0 Transitional//EN" "http://www.w3.org/TR/REC-html40/loose.dtd"> <html><body> <h1 id="混币服务">混币服务</h1> <h2 id="比特币基本知识">比特币基本知识</h2> <p>比特币协议用地址(address)描述交易参与方，每笔交易包括输入方和输出方，输入方地址的比特币按照指定比例发给输出方地址。</p> <p>因此在比特币交易视角看来是多个地址之间在进行交易。一个地址对应一个用户，但一个用户可以拥有多个地址。比特币管理软件可以让用户创建和操作任意数量的地址。因为用户控制地址进行交易，地址又不包括用户信息无法准确逆映射，因此在比特币交易中不会保留参与者的身份信息。这种用户与地址间一对多的关系是比特币匿名性的基础，也被称为伪匿名性。</p> <blockquote> <p>但好像匿名性的基础是无法通过地址反向追踪到用户吧，无法逆映射好像才更重要一点。</p> </blockquote> <h2 id="混币服务-1">混币服务</h2> </body></html>
